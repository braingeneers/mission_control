schema_version: 1
kind: braingeneers-mcp-policy
service: integrated-system-mcp
description: >
  UUID-first authorization for the integrated-system MCP server. The default
  helper-token rollout relies on validated identity plus explicit YAML grants.
  Deployments may add optional coarse eligibility in the `eligibility` block
  when they need an extra issuer-side service gate.
group_files:
  - groups.yaml
grants:
  - uuid: 2026-03-12-efi-sandbox
    description: Read-only visibility for a sandbox UUID.
    principals:
      groups:
        - integrated-system-readers
    access:
      - read
    devices:
      - name: "*"
        access:
          - read
  - uuid: 2026-03-12-efi-sandbox
    description: Device actuation rights for the dorothy electrophysiology rig.
    principals:
      groups:
        - integrated-system-operators
    access:
      - operate
    devices:
      - name: dorothy
        access:
          - operate
  - uuid: 2026-03-12-efi-sandbox
    description: Explicit experiment-binding rights for dorothy.
    principals:
      groups:
        - integrated-system-experiment-admins
    access:
      - bind
    devices:
      - name: dorothy
        access:
          - bind
        command_rules:
          - effect: allow
            commands:
              - START
              - END
  - uuid: 2026-03-12-efi-mock-organoid
    description: Read-only visibility for the broker-backed MockOrganoid demo UUID.
    principals:
      groups:
        - integrated-system-readers
    access:
      - read
    devices:
      - name: mock-maxwell-a
        access:
          - read
      - name: mock-opencvcamera-a
        access:
          - read
      - name: mock-autoculture-a
        access:
          - read
  - uuid: 2026-03-12-efi-mock-organoid
    description: Guests may use the full mock command surface against the sibling mock devices only.
    principals:
      groups:
        - integrated-system-mock-organoid-guests
    access:
      - read
      - operate
      - bind
    devices:
      - name: mock-maxwell-a
        access:
          - read
          - operate
          - bind
        command_rules:
          - effect: allow
            command_groups:
              - read-only
              - actuation
              - experiment-control
      - name: mock-opencvcamera-a
        access:
          - read
          - operate
          - bind
        command_rules:
          - effect: allow
            command_groups:
              - read-only
              - actuation
              - experiment-control
      - name: mock-autoculture-a
        access:
          - read
          - operate
          - bind
        command_rules:
          - effect: allow
            command_groups:
              - read-only
              - actuation
              - experiment-control
